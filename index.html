<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Ticks — Multi Stopwatch Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    /* PHASE BAR */
    .phase-bar {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 12px;
      overflow: hidden
    }

    .phase-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 0;
      font-size: .63rem;
      font-weight: 700;
      flex: 1;
      justify-content: center;
      position: relative;
      transition: all .25s;
      white-space: nowrap;
      cursor: default
    }

    .phase-pill:first-child {
      border-radius: 8px 0 0 8px
    }

    .phase-pill:last-child {
      border-radius: 0 8px 8px 0
    }

    .phase-pill.ph-done {
      background: rgba(34, 197, 94, .1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, .25)
    }

    .phase-pill.ph-active {
      border: 1px solid currentColor;
      color: var(--active-color, #8b5cf6);
      background: rgba(139, 92, 246, .08)
    }

    .phase-pill.ph-upcoming {
      background: var(--s3);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    .phase-pill+.phase-pill {
      border-left: none
    }

    .ph-elapsed {
      font-family: 'JetBrains Mono', monospace;
      font-size: .6rem;
      opacity: .8
    }

    /* PHASE SECTION SUMMARY */
    .phase-section {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 6px
    }

    .phase-sec-hdr {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      background: var(--s3)
    }

    .phase-sec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .phase-sec-name {
      flex: 1;
      font-size: .78rem;
      font-weight: 700
    }

    .phase-sec-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted)
    }

    .phase-sec-eff {
      font-size: .62rem;
      font-weight: 800;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 4px
    }

    .phase-sec-body {
      padding: 7px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: var(--s2)
    }

    .ph-no-pause {
      font-size: .7rem;
      color: var(--muted);
      font-style: italic;
      padding: 2px 0
    }

    .ph-pause-item {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .ph-pause-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px
    }

    .ph-pause-reason {
      font-size: .72rem;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .ph-pause-meta {
      font-size: .65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      flex-shrink: 0
    }

    /* OLD COMPAT (unused but harmless) */
    .ps-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      color: var(--muted)
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #07080f;
      --s1: #0c0e18;
      --s2: #111420;
      --s3: #181c2c;
      --s4: #1e2336;
      --border: rgba(255, 255, 255, .07);
      --bh: rgba(255, 255, 255, .13);
      --text: #e0e7ff;
      --muted: #4a5080;
      --r: 20px;
      --r2: 12px
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, .06), transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, .05), transparent 60%);
      pointer-events: none
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--s4);
      border-radius: 4px
    }

    button,
    input {
      font-family: 'Inter', sans-serif;
      outline: none
    }

    button {
      cursor: pointer;
      border: none
    }

    .hdr {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1300px;
      margin: 0 auto
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-ico {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 20px rgba(139, 92, 246, .4)
    }

    .brand-name {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -.5px
    }

    .brand-sub {
      font-size: .62rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .live-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: .88rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px
    }

    /* NAV */
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3px;
      max-width: 1300px;
      margin: 16px auto 0;
      width: calc(100% - 48px)
    }

    .nav-tab {
      flex: 1;
      padding: 8px;
      border-radius: 9px;
      font-size: .8rem;
      font-weight: 700;
      background: transparent;
      color: var(--muted);
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .nav-tab.active {
      background: var(--s4);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .4)
    }

    /* PAGES */
    .page {
      display: none;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px 60px
    }

    .page.active {
      display: block
    }

    /* ADD BUTTON */
    .add-wrap {
      padding-top: 16px
    }

    .add-btn {
      width: 100%;
      padding: 13px;
      background: var(--s2);
      border: 2px dashed rgba(139, 92, 246, .3);
      border-radius: var(--r);
      font-size: .85rem;
      font-weight: 700;
      color: rgba(139, 92, 246, .7);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all .2s
    }

    .add-btn:hover {
      border-color: rgba(139, 92, 246, .6);
      color: #a78bfa;
      background: rgba(139, 92, 246, .05)
    }

    .add-form {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px
    }

    .add-form.open {
      display: flex
    }

    .add-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .add-input {
      flex: 1;
      min-width: 160px;
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--r2);
      font-size: .85rem
    }

    .add-input:focus {
      border-color: rgba(139, 92, 246, .5)
    }

    .add-input::placeholder {
      color: var(--muted)
    }

    .color-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      transition: all .15s;
      border: 2px solid transparent
    }

    .color-swatch:hover,
    .color-swatch.sel {
      border-color: white;
      transform: scale(1.15)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 15px;
      border-radius: var(--r2);
      font-size: .8rem;
      font-weight: 700;
      transition: all .15s
    }

    .btn-purple {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      box-shadow: 0 2px 12px rgba(139, 92, 246, .4)
    }

    .btn-purple:hover {
      filter: brightness(1.1)
    }

    .btn-ghost {
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text)
    }

    .btn-ghost:hover {
      border-color: var(--bh);
      background: var(--s4)
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
      margin-top: 16px
    }

    /* CARD */
    .sw-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      position: relative;
      transition: box-shadow .3s
    }

    .sw-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px
    }

    .sw-name-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      min-width: 0
    }

    .sw-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all .3s
    }

    .sw-dot.pulse {
      animation: dpulse 1.2s ease-in-out infinite
    }

    @keyframes dpulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 currentColor
      }

      50% {
        box-shadow: 0 0 0 5px transparent
      }
    }

    .sw-name {
      font-size: .88rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .sw-session-badge {
      font-size: .6rem;
      font-weight: 700;
      background: var(--s3);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0
    }

    .sw-delete {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s
    }

    .sw-delete:hover {
      background: rgba(239, 68, 68, .1);
      border-color: rgba(239, 68, 68, .3);
      color: #ef4444
    }

    /* ARC */
    .arc-wrap {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 12px
    }

    .arc-svg {
      width: 150px;
      height: 150px;
      transform: rotate(-90deg)
    }

    .arc-track {
      fill: none;
      stroke: var(--s3);
      stroke-width: 7
    }

    .arc-fill {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset .15s linear
    }

    .arc-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px
    }

    .sw-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      transition: color .3s
    }

    .sw-ms {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      font-weight: 600;
      color: var(--muted)
    }

    .sw-status {
      font-size: .58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-top: 1px
    }

    /* SEGMENT BAR */
    .seg-bar-wrap {
      margin-bottom: 10px
    }

    .seg-bar {
      height: 6px;
      border-radius: 4px;
      background: var(--s3);
      overflow: hidden;
      display: flex;
      gap: 1px
    }

    .seg {
      border-radius: 3px;
      transition: width .2s linear;
      min-width: 2px
    }

    .seg-active {
      background: #22c55e
    }

    .seg-pause {
      background: #f59e0b
    }

    .seg-now {
      animation: segpulse 1s ease-in-out infinite alternate
    }

    @keyframes segpulse {
      from {
        opacity: .7
      }

      to {
        opacity: 1
      }
    }

    /* LIVE PAUSE LOG */
    .live-log {
      max-height: 72px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px
    }

    .ll-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: .68rem;
      padding: 3px 7px;
      background: var(--s3);
      border-radius: 7px
    }

    .ll-dur {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: #f59e0b;
      flex-shrink: 0
    }

    .ll-reason {
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* STATUS ROW */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px
    }

    .s-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .62rem;
      font-weight: 700
    }

    .sb-idle {
      background: var(--s3);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    .sb-running {
      background: rgba(34, 197, 94, .1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, .25)
    }

    .sb-paused {
      background: rgba(245, 158, 11, .1);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, .25)
    }

    .sb-stopped {
      background: rgba(239, 68, 68, .08);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, .2)
    }

    .total-lbl {
      font-size: .62rem;
      color: var(--muted);
      font-weight: 600
    }

    .total-paused {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      color: #f59e0b;
      font-weight: 700
    }

    /* PAUSE BLOCK */
    .pause-block {
      background: var(--s3);
      border-radius: var(--r2);
      padding: 9px 11px;
      margin-bottom: 10px;
      display: none;
      flex-direction: column;
      gap: 6px
    }

    .pause-block.visible {
      display: flex
    }

    .pause-top {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .pause-ico {
      font-size: .82rem;
      animation: blink .8s step-end infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .pause-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      flex: 1
    }

    .pause-timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      font-weight: 700;
      color: #f59e0b
    }

    .pause-reason-input {
      background: var(--s4);
      border: 1px solid rgba(245, 158, 11, .3);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: .78rem;
      width: 100%;
      transition: border-color .2s
    }

    .pause-reason-input:focus {
      border-color: rgba(245, 158, 11, .6)
    }

    .pause-reason-input::placeholder {
      color: var(--muted)
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 6px
    }

    .ctrl-btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--r2);
      font-size: .76rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all .15s
    }

    .ctrl-start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 2px 12px rgba(34, 197, 94, .35)
    }

    .ctrl-start:hover {
      filter: brightness(1.1)
    }

    .ctrl-pause {
      background: rgba(245, 158, 11, .15);
      border: 1px solid rgba(245, 158, 11, .35);
      color: #f59e0b
    }

    .ctrl-pause:hover {
      background: rgba(245, 158, 11, .25)
    }

    .ctrl-resume {
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .3);
      color: #22c55e
    }

    .ctrl-resume:hover {
      background: rgba(34, 197, 94, .2)
    }

    .ctrl-stop {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: #ef4444
    }

    .ctrl-stop:hover {
      background: rgba(239, 68, 68, .18)
    }

    .ctrl-new {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      box-shadow: 0 2px 12px rgba(139, 92, 246, .35)
    }

    .ctrl-new:hover {
      filter: brightness(1.1)
    }

    .ctrl-btn:disabled {
      opacity: .35;
      cursor: not-allowed
    }

    /* SESSION SUMMARY */
    .summary {
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px
    }

    .summary-hdr {
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .eff-pill {
      font-size: .68rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px
    }

    .eff-hi {
      background: rgba(34, 197, 94, .12);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, .3)
    }

    .eff-mid {
      background: rgba(245, 158, 11, .12);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, .3)
    }

    .eff-lo {
      background: rgba(239, 68, 68, .1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, .25)
    }

    .sum-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px
    }

    .sum-stat {
      background: var(--s3);
      border-radius: 9px;
      padding: 7px 8px;
      text-align: center
    }

    .sum-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      font-weight: 800;
      line-height: 1
    }

    .sum-l {
      font-size: .55rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-top: 3px
    }

    .breakdown-title {
      font-size: .65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .br-item {
      margin-bottom: 6px
    }

    .br-item:last-child {
      margin-bottom: 0
    }

    .br-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2px
    }

    .br-reason {
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%
    }

    .br-meta {
      font-size: .67rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap
    }

    .br-bar-bg {
      height: 4px;
      border-radius: 3px;
      background: var(--s4)
    }

    .br-bar {
      height: 4px;
      border-radius: 3px;
      transition: width .6s cubic-bezier(.34, 1.56, .64, 1)
    }

    /* EMPTY */
    .empty {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 12px;
      text-align: center
    }

    .empty-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px dashed rgba(139, 92, 246, .25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      animation: spin-slow 20s linear infinite
    }

    @keyframes spin-slow {
      to {
        transform: rotate(360deg)
      }
    }

    .empty-ttl {
      font-size: 1rem;
      font-weight: 800
    }

    .empty-sub {
      font-size: .8rem;
      color: var(--muted);
      max-width: 240px;
      line-height: 1.6
    }

    /* ANALYTICS */
    .analytics-head {
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .range-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap
    }

    .range-btn {
      padding: 6px 13px;
      border-radius: 9px;
      font-size: .75rem;
      font-weight: 700;
      background: var(--s3);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all .15s
    }

    .range-btn.active {
      background: rgba(139, 92, 246, .15);
      color: #a78bfa;
      border-color: rgba(139, 92, 246, .4)
    }

    .agg-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px
    }

    .agg-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 14px 16px
    }

    .agg-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1
    }

    .agg-l {
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin-top: 4px
    }

    .section-title {
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted);
      margin-top: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .pareto-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 8px 12px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px
    }

    .pareto-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between
    }

    .pareto-reason {
      font-size: .8rem;
      font-weight: 700
    }

    .pareto-meta {
      font-size: .72rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted)
    }

    .pareto-bar-bg {
      height: 5px;
      border-radius: 3px;
      background: var(--s3);
      margin-top: 2px
    }

    .pareto-bar {
      height: 5px;
      border-radius: 3px
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px
    }

    .timer-dot-lg {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .timer-info {
      flex: 1;
      min-width: 0
    }

    .timer-row-name {
      font-size: .82rem;
      font-weight: 700
    }

    .timer-row-sub {
      font-size: .68rem;
      color: var(--muted)
    }

    .timer-row-eff {
      font-size: .75rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px
    }

    .no-data {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: .85rem
    }

    /* TOAST */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none
    }

    .toast {
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: .76rem;
      font-weight: 600;
      animation: tin .25s ease;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .7)
    }

    @keyframes tin {
      from {
        opacity: 0;
        transform: translateX(14px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }
  </style>
</head>

<body>
  <header class="hdr">
    <div class="brand">
      <div class="brand-ico">⏱</div>
      <div>
        <div class="brand-name">Ticks</div>
        <div class="brand-sub">Multi-Stopwatch Tracker</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="live-clock" id="liveClock"></div>
    </div>
  </header>

  <div class="nav-tabs" style="max-width:1300px;margin:16px auto 0;width:calc(100% - 48px)">
    <button class="nav-tab active" onclick="showPage('timers',this)">⏱ Timers</button>
    <button class="nav-tab" onclick="showPage('analytics',this)">📊 Analytics</button>
  </div>

  <!-- TIMERS PAGE -->
  <div class="page active" id="page-timers">
    <div class="add-wrap">
      <button class="add-btn" id="addToggleBtn" onclick="toggleAddForm()">＋ New Stopwatch</button>
      <div class="add-form" id="addForm">
        <div class="add-row">
          <input class="add-input" id="swName" placeholder="What are you tracking?" maxlength="40" />
          <button class="btn btn-purple" onclick="createStopwatch()">Create →</button>
          <button class="btn btn-ghost" onclick="toggleAddForm()">Cancel</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span
            style="font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Color</span>
          <div class="color-row" id="colorRow"></div>
        </div>
      </div>
    </div>
    <div class="grid" id="grid">
      <div class="empty" id="emptyState">
        <div class="empty-ring">⏱</div>
        <div class="empty-ttl">No timers yet</div>
        <div class="empty-sub">Hit <strong>+ New Stopwatch</strong> to start tracking.</div>
      </div>
    </div>
  </div>

  <!-- ANALYTICS PAGE -->
  <div class="page" id="page-analytics">
    <div class="analytics-head">
      <div class="range-tabs" id="rangeTabs">
        <button class="range-btn active" data-range="day" onclick="setRange('day',this)">Today</button>
        <button class="range-btn" data-range="week" onclick="setRange('week',this)">This Week</button>
        <button class="range-btn" data-range="month" onclick="setRange('month',this)">This Month</button>
        <button class="range-btn" data-range="quarter" onclick="setRange('quarter',this)">Quarter</button>
        <button class="range-btn" data-range="halfyear" onclick="setRange('halfyear',this)">6 Months</button>
        <button class="range-btn" data-range="year" onclick="setRange('year',this)">This Year</button>
        <button class="range-btn" data-range="all" onclick="setRange('all',this)">All Time</button>
      </div>
      <div class="agg-stats" id="aggStats"></div>
      <div>
        <div class="section-title">🔴 Top Pause Reasons</div>
        <div id="paretoList"></div>
      </div>
      <div>
        <div class="section-title">⏱ Per Timer</div>
        <div id="timerList"></div>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="tw"></div>

  <script>
    const COLORS = [{ hex: '#8b5cf6' }, { hex: '#06b6d4' }, { hex: '#22c55e' }, { hex: '#f59e0b' }, { hex: '#ef4444' }, { hex: '#ec4899' }, { hex: '#f97316' }, { hex: '#3b82f6' }];
    const TIMERS_KEY = 'ticks_timers_v1';
    let colorIdx = 0, selectedColor = COLORS[0].hex, timers = {}, raf = null, currentRange = 'day';

    // ── PERSISTENCE ────────────────────────────────────
    const DEFAULT_PHASES = ['Bring Up', 'Test', 'Shutdown'];
    function saveTimers() {
      const out = {};
      const now = Date.now();
      Object.values(timers).forEach(t => {
        // Snapshot live phase elapsed before saving
        const phases = t.phases.map((ph, i) => ({
          name: ph.name, done: ph.done,
          elapsed: (i === t.currentPhaseIdx && t.state === 'running' && t.phaseStartedAt) ? ph.elapsed + (now - t.phaseStartedAt) : ph.elapsed
        }));
        out[t.id] = {
          id: t.id, name: t.name, color: t.color, state: t.state === 'stopped' ? 'stopped' : 'idle',
          elapsed: t.state === 'running' ? now - t.startedAt : t.elapsed,
          startedAt: t.state === 'running' ? t.startedAt : null,
          currentReason: t.currentReason,
          pauses: t.pauses, segments: t.segments,
          sessionStart: t.sessionStart, sessionCount: t.sessionCount,
          history: t.history, savedAt: now,
          phases, currentPhaseIdx: t.currentPhaseIdx,
          phaseStartedAt: t.state === 'running' ? now : null
        };
      });
      localStorage.setItem(TIMERS_KEY, JSON.stringify(out));
    }
    function loadTimers() {
      const raw = JSON.parse(localStorage.getItem(TIMERS_KEY) || '{}');
      Object.values(raw).forEach(saved => {
        const now = Date.now();
        let elapsed = saved.elapsed || 0;
        if (saved.startedAt) elapsed = now - saved.startedAt;
        const phases = (saved.phases && saved.phases.length) ? saved.phases : DEFAULT_PHASES.map(n => ({ name: n, elapsed: 0, done: false }));
        timers[saved.id] = {
          id: saved.id, name: saved.name, color: saved.color,
          state: saved.startedAt ? 'running' : saved.state || 'idle',
          elapsed, startedAt: saved.startedAt || null,
          pauseStart: null, currentReason: saved.currentReason || '',
          pauses: saved.pauses || [], segments: saved.segments || [],
          sessionStart: saved.sessionStart, sessionCount: saved.sessionCount || 0,
          history: saved.history || [],
          phases, currentPhaseIdx: saved.currentPhaseIdx || 0,
          phaseStartedAt: saved.startedAt ? now : null
        };
        document.getElementById('emptyState')?.remove();
        renderCard(saved.id);
        if (saved.startedAt) {
          document.getElementById('dot_' + saved.id).classList.add('pulse');
          document.getElementById('card_' + saved.id).style.boxShadow = `0 0 0 1px rgba(${hr(saved.color)},.3),0 8px 40px rgba(${hr(saved.color)},.12)`;
          updateBadge(saved.id);
          updateControls(saved.id);
          toast('⏱ Resumed: ' + saved.name);
        }
        if (saved.state === 'stopped') renderSummary(saved.id);
        updateLiveLog(saved.id);
        updatePhaseBar(saved.id);
      });
    }
    const LS_KEY = 'ticks_sessions_v1';

    // ── CLOCK ─────────────────────────────────────────
    setInterval(() => document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }), 500);
    document.getElementById('liveClock').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });

    // ── PAGES ─────────────────────────────────────────
    function showPage(name, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      btn.classList.add('active');
      if (name === 'analytics') renderAnalytics();
    }

    // ── COLORS ────────────────────────────────────────
    function buildColorRow() {
      document.getElementById('colorRow').innerHTML = COLORS.map((c, i) => `<div class="color-swatch${i === 0 ? ' sel' : ''}" style="background:${c.hex}" onclick="pickColor('${c.hex}',this)"></div>`).join('');
    }
    function pickColor(hex, el) { selectedColor = hex; document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('sel')); el.classList.add('sel'); }
    buildColorRow();

    // ── ADD FORM ──────────────────────────────────────
    function toggleAddForm() {
      const f = document.getElementById('addForm'), b = document.getElementById('addToggleBtn');
      const open = f.classList.toggle('open');
      b.style.display = open ? 'none' : 'flex';
      if (open) document.getElementById('swName').focus();
    }

    // ── CREATE ────────────────────────────────────────
    function createStopwatch() {
      const name = document.getElementById('swName').value.trim() || 'Timer ' + (Object.keys(timers).length + 1);
      const id = 'sw_' + Date.now();
      const defaultPhases = ['Bring Up', 'Test', 'Shutdown'];
      timers[id] = { id, name, color: selectedColor, state: 'idle', elapsed: 0, startedAt: null, pauseStart: null, currentReason: '', pauses: [], segments: [], sessionStart: null, sessionCount: 0, history: [], phases: defaultPhases.map(n => ({ name: n, elapsed: 0, done: false })), currentPhaseIdx: 0, phaseStartedAt: null };
      document.getElementById('swName').value = '';
      toggleAddForm();
      document.getElementById('emptyState')?.remove();
      renderCard(id);
      colorIdx = (colorIdx + 1) % COLORS.length; selectedColor = COLORS[colorIdx].hex;
      document.querySelectorAll('.color-swatch').forEach((s, i) => s.classList.toggle('sel', i === colorIdx));
      ensureRAF();
      saveTimers();
      toast('Timer created — hit Start ▶');
    }
    // ── CARD ──────────────────────────────────────────
    function renderCard(id) {
      const t = timers[id]; const circ = 2 * Math.PI * 65;
      const card = document.createElement('div');
      card.className = 'sw-card'; card.id = 'card_' + id;
      card.innerHTML = `
    <div class="sw-card-top">
      <div class="sw-name-wrap">
        <span class="sw-dot" id="dot_${id}" style="background:${t.color}"></span>
        <span class="sw-name">${esc(t.name)}</span>
        <span class="sw-session-badge" id="scount_${id}">S0</span>
      </div>
      <button class="sw-delete" onclick="deleteTimer('${id}')">✕</button>
    </div>
    <div class="phase-bar" id="phasebar_${id}"></div>
    <div class="arc-wrap">
      <svg class="arc-svg" viewBox="0 0 150 150">
        <circle class="arc-track" cx="75" cy="75" r="65"/>
        <circle class="arc-fill" id="arc_${id}" cx="75" cy="75" r="65"
          stroke="${t.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
          style="filter:drop-shadow(0 0 6px ${t.color})"/>
      </svg>
      <div class="arc-center">
        <div class="sw-time" id="time_${id}" style="color:${t.color}">00:00:00</div>
        <div class="sw-ms" id="ms_${id}">.00</div>
        <div class="sw-status" id="stat_${id}" style="color:var(--muted)">IDLE</div>
      </div>
    </div>
    <div class="seg-bar-wrap"><div class="seg-bar" id="seg_${id}"></div></div>
    <div class="live-log" id="livelog_${id}"></div>
    <div class="status-row">
      <span class="s-badge sb-idle" id="badge_${id}">⏺ Idle</span>
      <span class="total-lbl">Paused: <span class="total-paused" id="ptotal_${id}">0:00</span></span>
    </div>
    <div class="pause-block" id="pb_${id}">
      <div class="pause-top">
        <span class="pause-ico">⏸</span>
        <span class="pause-label" style="color:#f59e0b">Paused</span>
        <span class="pause-timer" id="ptime_${id}">0:00</span>
      </div>
      <input class="pause-reason-input" id="preason_${id}" placeholder="Reason for pause…" maxlength="80"
        oninput="timers['${id}'].currentReason=this.value"/>
    </div>
    <div class="controls" id="ctrl_${id}"></div>`;
      updatePhaseBar(id);
      document.getElementById('grid').appendChild(card);
      card.style.boxShadow = `0 0 0 1px rgba(${hr(t.color)},.12)`;
      updateControls(id);
    }

    // ── ACTIONS ───────────────────────────────────────
    function startTimer(id) {
      const t = timers[id];
      if (t.state === 'stopped') return;
      if (t.state === 'idle') { t.sessionStart = Date.now(); t.sessionCount++; t.phaseStartedAt = Date.now(); }
      t.state = 'running'; t.startedAt = Date.now() - t.elapsed;
      t.segments.push({ type: 'active', start: Date.now(), end: null });
      updateControls(id); updateBadge(id); updatePhaseBar(id);
      document.getElementById('dot_' + id).classList.add('pulse');
      document.getElementById('dot_' + id).style.background = t.color;
      document.getElementById('scount_' + id).textContent = 'S' + t.sessionCount;
      const card = document.getElementById('card_' + id);
      card.style.boxShadow = `0 0 0 1px rgba(${hr(t.color)},.3),0 8px 40px rgba(${hr(t.color)},.12)`;
      saveTimers();
    }

    function advancePhase(id) {
      const t = timers[id];
      if (t.state !== 'running') return;
      const now = Date.now();
      // Commit current phase elapsed
      if (t.phaseStartedAt) t.phases[t.currentPhaseIdx].elapsed += now - t.phaseStartedAt;
      t.phases[t.currentPhaseIdx].done = true;
      if (t.currentPhaseIdx < t.phases.length - 1) {
        t.currentPhaseIdx++;
        t.phaseStartedAt = now;
      }
      updatePhaseBar(id);
      updateControls(id);
      saveTimers();
      toast('Phase: ' + t.phases[t.currentPhaseIdx].name);
    }

    function updatePhaseBar(id) {
      const t = timers[id];
      const el = document.getElementById('phasebar_' + id);
      if (!el) return;
      el.innerHTML = t.phases.map((ph, i) => {
        const isActive = i === t.currentPhaseIdx && (t.state === 'running' || t.state === 'paused');
        const isDone = ph.done;
        const cls = isDone ? 'ph-done' : isActive ? 'ph-active' : 'ph-upcoming';
        const icon = isDone ? '✓' : isActive ? '●' : '';
        const timeStr = (isDone || isActive) && ph.elapsed > 0 ? `<span class="ph-elapsed">${fmtShort(ph.elapsed)}</span>` : '';
        const style = isActive ? `style="--active-color:${t.color};border-color:${t.color};background:rgba(${hr(t.color)},.1);color:${t.color}"` : '';
        return `<div class="phase-pill ${cls}" ${style}>${icon ? icon + ' ' : ''}${esc(ph.name)}${timeStr}</div>`;
      }).join('');
    }
    function pauseTimer(id) {
      const t = timers[id]; if (t.state !== 'running') return;
      t.elapsed = Date.now() - t.startedAt;
      const last = t.segments[t.segments.length - 1]; if (last) last.end = Date.now();
      t.state = 'paused'; t.pauseStart = Date.now(); t.currentReason = '';
      t.segments.push({ type: 'pause', start: Date.now(), end: null, reason: '' });
      document.getElementById('preason_' + id).value = '';
      document.getElementById('pb_' + id).classList.add('visible');
      updateControls(id); updateBadge(id);
      document.getElementById('card_' + id).style.boxShadow = `0 0 0 1px rgba(245,158,11,.3),0 8px 40px rgba(245,158,11,.08)`;
      setTimeout(() => document.getElementById('preason_' + id)?.focus(), 50);
      saveTimers();
    }
    function resumeTimer(id) {
      const t = timers[id]; if (t.state !== 'paused') return;
      const dur = Date.now() - t.pauseStart;
      const last = t.segments[t.segments.length - 1];
      if (last) { last.end = Date.now(); last.reason = t.currentReason || 'Unspecified'; }
      t.pauses.push({ duration: dur, reason: t.currentReason || 'Unspecified', phaseIdx: t.currentPhaseIdx, phaseName: t.phases[t.currentPhaseIdx]?.name || '' });
      t.state = 'running'; t.startedAt = Date.now() - t.elapsed; t.pauseStart = null;
      t.segments.push({ type: 'active', start: Date.now(), end: null });
      document.getElementById('pb_' + id).classList.remove('visible');
      updateLiveLog(id);
      updateControls(id); updateBadge(id);
      document.getElementById('card_' + id).style.boxShadow = `0 0 0 1px rgba(${hr(t.color)},.3),0 8px 40px rgba(${hr(t.color)},.12)`;
      saveTimers();
    }
    function stopTimer(id) {
      const t = timers[id]; if (t.state === 'idle' || t.state === 'stopped') return;
      const now = Date.now();
      if (t.state === 'paused') {
        const dur = now - t.pauseStart;
        const last = t.segments[t.segments.length - 1];
        if (last) { last.end = now; last.reason = t.currentReason || 'Unspecified'; }
        t.pauses.push({ duration: dur, reason: t.currentReason || 'Unspecified', phaseIdx: t.currentPhaseIdx, phaseName: t.phases[t.currentPhaseIdx]?.name || '' });
      } else {
        t.elapsed = now - t.startedAt;
        const last = t.segments[t.segments.length - 1]; if (last) last.end = now;
      }
      // Commit current phase elapsed
      if (t.phaseStartedAt && t.state === 'running') t.phases[t.currentPhaseIdx].elapsed += now - t.phaseStartedAt;
      t.phaseStartedAt = null;
      t.state = 'stopped';
      document.getElementById('pb_' + id).classList.remove('visible');
      document.getElementById('dot_' + id).classList.remove('pulse');
      const pausedMs = t.pauses.reduce((a, p) => a + p.duration, 0);
      const sessionData = { timerId: id, timerName: t.name, timerColor: t.color, sessionId: 'ses_' + Date.now(), startTime: t.sessionStart || Date.now() - t.elapsed, endTime: now, totalMs: t.elapsed, pausedMs, activeMs: Math.max(0, t.elapsed - pausedMs), pauses: [...t.pauses], phases: t.phases.map(p => ({ name: p.name, elapsed: p.elapsed })) };
      t.history.push(sessionData);
      saveSession(sessionData);
      updateLiveLog(id);
      updateControls(id); updateBadge(id); updatePhaseBar(id);
      document.getElementById('card_' + id).style.boxShadow = `0 0 0 1px rgba(239,68,68,.2)`;
      renderSummary(id);
      saveTimers();
    }
    function restartTimer(id) {
      const t = timers[id];
      t.state = 'idle'; t.elapsed = 0; t.startedAt = null; t.pauseStart = null; t.currentReason = '';
      t.pauses = []; t.segments = []; t.sessionStart = null;
      t.phases = t.phases.map(ph => ({ name: ph.name, elapsed: 0, done: false }));
      t.currentPhaseIdx = 0; t.phaseStartedAt = null;
      document.getElementById('pb_' + id).classList.remove('visible');
      const old = document.getElementById('sum_' + id); if (old) old.remove();
      updateControls(id); updateBadge(id); updatePhaseBar(id);
      document.getElementById('dot_' + id).style.background = t.color;
      document.getElementById('card_' + id).style.boxShadow = `0 0 0 1px rgba(${hr(t.color)},.12)`;
      updateLiveLog(id);
      document.getElementById('seg_' + id).innerHTML = '';
      saveTimers();
      toast('Ready — hit Start ▶ to begin a new session');
    }
    function deleteTimer(id) {
      delete timers[id];
      document.getElementById('card_' + id).remove();
      saveTimers();
      if (!Object.keys(timers).length) {
        document.getElementById('grid').innerHTML = `<div class="empty" id="emptyState"><div class="empty-ring">⏱</div><div class="empty-ttl">No timers yet</div><div class="empty-sub">Hit <strong>+ New Stopwatch</strong> to start tracking.</div></div>`;
      }
    }

    // ── CONTROLS ──────────────────────────────────────
    function updateControls(id) {
      const t = timers[id];
      const el = document.getElementById('ctrl_' + id);
      const hasNextPhase = t.currentPhaseIdx < t.phases.length - 1;
      const nextPhaseName = hasNextPhase ? t.phases[t.currentPhaseIdx + 1].name : '';
      const nextPhaseBtn = hasNextPhase ? `<button class="ctrl-btn" style="background:rgba(${hr(t.color)},.12);border:1px solid rgba(${hr(t.color)},.3);color:${t.color}" onclick="advancePhase('${id}')">→ ${esc(nextPhaseName)}</button>` : '';
      const m = {
        idle: `<button class="ctrl-btn ctrl-start" onclick="startTimer('${id}')">▶ Start</button>`,
        running: `<button class="ctrl-btn ctrl-pause" onclick="pauseTimer('${id}')">⏸ Pause</button>${nextPhaseBtn}<button class="ctrl-btn ctrl-stop" onclick="stopTimer('${id}')">⏹ Stop</button>`,
        paused: `<button class="ctrl-btn ctrl-resume" onclick="resumeTimer('${id}')">▶ Resume</button><button class="ctrl-btn ctrl-stop" onclick="stopTimer('${id}')">⏹ Stop</button>`,
        stopped: `<button class="ctrl-btn ctrl-new" onclick="restartTimer('${id}')">▶ New Session</button>`,
      };
      el.innerHTML = m[t.state] || m.idle;
    }

    function updateBadge(id) {
      const t = timers[id];
      const m = { idle: `<span class="s-badge sb-idle">⏺ Idle</span>`, running: `<span class="s-badge sb-running">● Running</span>`, paused: `<span class="s-badge sb-paused">⏸ Paused</span>`, stopped: `<span class="s-badge sb-stopped">⏹ Stopped</span>` };
      const el = document.getElementById('badge_' + id);
      if (el) el.outerHTML = m[t.state];
      // re-id
      const nb = document.querySelector(`#card_${id} .s-badge`); if (nb) nb.id = 'badge_' + id;
    }

    // ── LIVE LOG ──────────────────────────────────────
    function updateLiveLog(id) {
      const t = timers[id]; const el = document.getElementById('livelog_' + id);
      if (!el) return;
      if (!t.pauses.length) { el.innerHTML = ''; return; }
      el.innerHTML = t.pauses.slice().reverse().slice(0, 5).map(p => `<div class="ll-item"><span class="ll-dur">${fmtShort(p.duration)}</span><span class="ll-reason">${esc(p.reason)}</span></div>`).join('');
    }

    // ── SEGMENT BAR ───────────────────────────────────
    function updateSegBar(id, now) {
      const t = timers[id]; const el = document.getElementById('seg_' + id); if (!el) return;
      const total = t.state === 'running' ? now - t.startedAt : t.elapsed;
      if (total < 100) { el.innerHTML = ''; return; }
      let html = '';
      t.segments.forEach((seg, i) => {
        const end = seg.end || now;
        const dur = end - seg.start;
        const pct = Math.max(dur / total * 100, 0.3);
        const isLast = i === t.segments.length - 1 && !seg.end;
        const cls = seg.type === 'active' ? `seg-active${isLast ? ' seg-now' : ''}` : `seg-pause${isLast ? ' seg-now' : ''}`;
        html += `<div class="seg ${cls}" style="width:${pct}%"></div>`;
      });
      el.innerHTML = html;
    }

    // ── MAIN LOOP ─────────────────────────────────────
    function tick() {
      const now = Date.now();
      Object.values(timers).forEach(t => {
        let elapsed = t.elapsed;
        if (t.state === 'running') elapsed = now - t.startedAt;
        const tEl = document.getElementById('time_' + t.id);
        const mEl = document.getElementById('ms_' + t.id);
        const stEl = document.getElementById('stat_' + t.id);
        if (tEl) tEl.textContent = fmtHMS(elapsed);
        if (mEl) mEl.textContent = '.' + String(Math.floor((elapsed % 1000) / 10)).padStart(2, '0');
        if (stEl) { stEl.textContent = t.state === 'running' ? t.phases[t.currentPhaseIdx]?.name?.toUpperCase() || 'RUNNING' : t.state.toUpperCase(); stEl.style.color = t.state === 'running' ? t.color : t.state === 'paused' ? '#f59e0b' : t.state === 'stopped' ? '#ef4444' : 'var(--muted)'; }
        // Arc
        const circ = 2 * Math.PI * 65;
        const arc = document.getElementById('arc_' + t.id);
        if (arc) arc.setAttribute('stroke-dashoffset', circ * (1 - Math.min(elapsed / 3600000, 1)));
        // Pause sub-timer
        if (t.state === 'paused' && t.pauseStart) { const pe = document.getElementById('ptime_' + t.id); if (pe) pe.textContent = fmtShort(now - t.pauseStart); }
        // Total paused
        const pt = document.getElementById('ptotal_' + t.id);
        if (pt) { const run = t.state === 'paused' && t.pauseStart ? now - t.pauseStart : 0; pt.textContent = fmtShort(t.pauses.reduce((a, p) => a + p.duration, 0) + run); }
        // Live phase elapsed in pill
        if (t.state === 'running' && t.phaseStartedAt) {
          const livePhaseEl = document.querySelector(`#phasebar_${t.id} .ph-active .ph-elapsed`);
          if (livePhaseEl) livePhaseEl.textContent = fmtShort(t.phases[t.currentPhaseIdx].elapsed + (now - t.phaseStartedAt));
        }
        // Seg bar
        if (t.state === 'running' || t.state === 'paused') updateSegBar(t.id, now);
      });
      raf = requestAnimationFrame(tick);
    }
    function ensureRAF() { if (!raf) raf = requestAnimationFrame(tick); }
    ensureRAF();

    // ── SUMMARY ───────────────────────────────────────
    function renderSummary(id) {
      const t = timers[id];
      const totalMs = t.elapsed;
      const pausedMs = t.pauses.reduce((a, p) => a + p.duration, 0);
      const activeMs = Math.max(0, totalMs - pausedMs);
      const eff = totalMs > 0 ? Math.round(activeMs / totalMs * 100) : 100;
      const effCls = eff >= 80 ? 'eff-hi' : eff >= 50 ? 'eff-mid' : 'eff-lo';

      // Build per-phase sections with their own pause breakdowns
      const phaseSectionsHtml = t.phases.map((ph, idx) => {
        if (ph.elapsed === 0 && !t.pauses.some(p => p.phaseIdx === idx)) return '';
        const phasePauses = t.pauses.filter(p => p.phaseIdx === idx);
        const phasePausedMs = phasePauses.reduce((a, p) => a + p.duration, 0);
        const phaseActiveMs = Math.max(0, ph.elapsed - phasePausedMs);
        const phEff = ph.elapsed > 0 ? Math.round(phaseActiveMs / ph.elapsed * 100) : 100;
        const phEffCls = phEff >= 80 ? 'eff-hi' : phEff >= 50 ? 'eff-mid' : 'eff-lo';
        const dotColor = ph.done ? '#22c55e' : t.color;

        // Group this phase's pauses by reason, sorted by duration
        const grouped = {};
        phasePauses.forEach(p => { const k = p.reason || 'Unspecified'; grouped[k] = (grouped[k] || 0) + p.duration; });
        const sorted = Object.entries(grouped).sort((a, b) => b[1] - a[1]);
        const maxP = sorted.length ? sorted[0][1] : 1;

        const pauseRowsHtml = sorted.length === 0
          ? `<div class="ph-no-pause">✓ No interruptions during this phase</div>`
          : sorted.map(([r, ms], i) => {
            const pct = ph.elapsed > 0 ? Math.round(ms / ph.elapsed * 100) : 0;
            const bp = Math.round(ms / maxP * 100);
            const bc = i === 0 ? '#ef4444' : i === 1 ? '#f97316' : '#f59e0b';
            const icon = i === 0 ? '🔴' : i === 1 ? '🟠' : '⚪';
            return `<div class="ph-pause-item">
                <div class="ph-pause-top">
                  <span class="ph-pause-reason">${icon} ${esc(r)}</span>
                  <span class="ph-pause-meta">${fmtShort(ms)} · ${pct}% of phase</span>
                </div>
                <div class="br-bar-bg"><div class="br-bar" style="width:0%;background:${bc}" data-w="${bp}"></div></div>
              </div>`;
          }).join('');

        return `<div class="phase-section">
          <div class="phase-sec-hdr">
            <div class="phase-sec-dot" style="background:${dotColor}"></div>
            <span class="phase-sec-name">${esc(ph.name)}</span>
            <span class="phase-sec-time">${fmtHMS(ph.elapsed)}</span>
            ${ph.elapsed > 0 ? `<span class="phase-sec-eff ${phEffCls}">${phEff}%</span>` : ''}
          </div>
          <div class="phase-sec-body">${pauseRowsHtml}</div>
        </div>`;
      }).join('');

      const el = document.createElement('div');
      el.className = 'summary'; el.id = 'sum_' + id;
      el.innerHTML = `<div class="summary-hdr">Session #${t.sessionCount} Summary<span class="eff-pill ${effCls}">${eff}% active</span></div>
    <div class="sum-stats">
      <div class="sum-stat"><div class="sum-n">${fmtHMS(totalMs)}</div><div class="sum-l">Total</div></div>
      <div class="sum-stat"><div class="sum-n" style="color:#22c55e">${fmtHMS(activeMs)}</div><div class="sum-l">Active</div></div>
      <div class="sum-stat"><div class="sum-n" style="color:#f59e0b">${fmtHMS(pausedMs)}</div><div class="sum-l">Paused</div></div>
    </div>
    <div class="breakdown-title" style="margin:8px 0 6px">Phase Breakdown</div>
    ${phaseSectionsHtml}`;
      const card = document.getElementById('card_' + id);
      document.getElementById('sum_' + id)?.remove();
      card.appendChild(el);
      setTimeout(() => el.querySelectorAll('.br-bar').forEach(b => { const w = b.dataset.w; b.style.width = '0'; requestAnimationFrame(() => b.style.width = w + '%'); }), 50);
    }

    // ── LOCALSTORAGE ──────────────────────────────────
    function saveSession(s) {
      const all = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
      all.push(s);
      localStorage.setItem(LS_KEY, JSON.stringify(all));
    }
    function loadSessions() { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }

    // ── ANALYTICS ─────────────────────────────────────
    function setRange(range, btn) {
      currentRange = range;
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAnalytics();
    }

    function getRangeStart(range) {
      const now = new Date();
      if (range === 'all') return new Date(0);
      if (range === 'day') { const d = new Date(now); d.setHours(0, 0, 0, 0); return d; }
      if (range === 'week') { const d = new Date(now); d.setDate(d.getDate() - d.getDay()); d.setHours(0, 0, 0, 0); return d; }
      if (range === 'month') { return new Date(now.getFullYear(), now.getMonth(), 1); }
      if (range === 'quarter') { const m = now.getMonth(); const qStart = Math.floor(m / 3) * 3; return new Date(now.getFullYear(), qStart, 1); }
      if (range === 'halfyear') { const d = new Date(now); d.setMonth(d.getMonth() - 6); return d; }
      if (range === 'year') { return new Date(now.getFullYear(), 0, 1); }
      return new Date(0);
    }

    function renderAnalytics() {
      const sessions = loadSessions();
      const since = getRangeStart(currentRange).getTime();
      const filtered = sessions.filter(s => s.startTime >= since);

      // Agg stats
      const totalSessions = filtered.length;
      const totalMs = filtered.reduce((a, s) => a + s.totalMs, 0);
      const activeMs = filtered.reduce((a, s) => a + s.activeMs, 0);
      const pausedMs = filtered.reduce((a, s) => a + s.pausedMs, 0);
      const eff = totalMs > 0 ? Math.round(activeMs / totalMs * 100) : 0;
      const effCls = eff >= 80 ? 'eff-hi' : eff >= 50 ? 'eff-mid' : 'eff-lo';

      document.getElementById('aggStats').innerHTML = `
    <div class="agg-card"><div class="agg-n">${totalSessions}</div><div class="agg-l">Sessions</div></div>
    <div class="agg-card"><div class="agg-n">${fmtHMS(totalMs)}</div><div class="agg-l">Total Time</div></div>
    <div class="agg-card"><div class="agg-n" style="color:#22c55e">${fmtHMS(activeMs)}</div><div class="agg-l">Active</div></div>
    <div class="agg-card"><div class="agg-n" style="color:#f59e0b">${fmtHMS(pausedMs)}</div><div class="agg-l">Paused</div></div>
    <div class="agg-card"><div class="agg-n"><span class="eff-pill ${effCls}" style="font-size:1rem">${eff}%</span></div><div class="agg-l">Efficiency</div></div>`;

      if (!filtered.length) {
        document.getElementById('paretoList').innerHTML = `<div class="no-data">No sessions in this period yet.</div>`;
        document.getElementById('timerList').innerHTML = '';
        return;
      }

      // Pareto
      const reasons = {};
      filtered.forEach(s => s.pauses.forEach(p => { const k = p.reason || 'Unspecified'; reasons[k] = (reasons[k] || 0) + p.duration; }));
      const sortedR = Object.entries(reasons).sort((a, b) => b[1] - a[1]);
      const maxR = sortedR.length ? sortedR[0][1] : 1;
      document.getElementById('paretoList').innerHTML = sortedR.length === 0 ? `<div class="no-data">No pauses recorded — great efficiency! 🎉</div>` :
        sortedR.map(([r, ms], i) => {
          const pct = pausedMs > 0 ? Math.round(ms / pausedMs * 100) : 0;
          const pctT = totalMs > 0 ? Math.round(ms / totalMs * 100) : 0;
          const bp = Math.round(ms / maxR * 100);
          const bc = i === 0 ? '#ef4444' : i === 1 ? '#f97316' : i === 2 ? '#f59e0b' : '#6b7280';
          return `<div class="pareto-item"><div class="pareto-top"><span class="pareto-reason">${i === 0 ? '🔴' : i === 1 ? '🟠' : i === 2 ? '🟡' : '⚪'} ${esc(r)}</span><span class="pareto-meta">${fmtHMS(ms)} · ${pct}% of downtime · ${pctT}% of total</span></div><div class="pareto-bar-bg"><div class="pareto-bar" style="width:${bp}%;background:${bc}"></div></div></div>`;
        }).join('');

      // Per-timer
      const byTimer = {};
      filtered.forEach(s => {
        if (!byTimer[s.timerId]) byTimer[s.timerId] = { name: s.timerName, color: s.timerColor, total: 0, active: 0, sessions: 0 };
        byTimer[s.timerId].total += s.totalMs;
        byTimer[s.timerId].active += s.activeMs;
        byTimer[s.timerId].sessions += 1;
      });
      const timerRows = Object.values(byTimer).sort((a, b) => b.total - a.total);
      document.getElementById('timerList').innerHTML = timerRows.map(tr => {
        const e = tr.total > 0 ? Math.round(tr.active / tr.total * 100) : 0;
        const ec = e >= 80 ? 'eff-hi' : e >= 50 ? 'eff-mid' : 'eff-lo';
        return `<div class="timer-row"><div class="timer-dot-lg" style="background:${tr.color}"></div><div class="timer-info"><div class="timer-row-name">${esc(tr.name)}</div><div class="timer-row-sub">${tr.sessions} session${tr.sessions !== 1 ? 's' : ''} · ${fmtHMS(tr.total)} total</div></div><span class="timer-row-eff ${ec}">${e}%</span></div>`;
      }).join('');
    }

    // ── FORMAT ────────────────────────────────────────
    function fmtHMS(ms) { const h = Math.floor(ms / 3600000), m = Math.floor(ms % 3600000 / 60000), s = Math.floor(ms % 60000 / 1000); return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`; }
    function fmtShort(ms) { const m = Math.floor(ms / 60000), s = Math.floor(ms % 60000 / 1000); return `${m}:${String(s).padStart(2, '0')}`; }
    function hr(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `${r},${g},${b}`; }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ── TOAST ─────────────────────────────────────────
    function toast(msg) { const w = document.getElementById('tw'); const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; w.appendChild(t); setTimeout(() => t.remove(), 2200); }

    // ── AUTOSAVE running timers every 10s ─────────────
    setInterval(() => { if (Object.values(timers).some(t => t.state === 'running' || t.state === 'paused')) saveTimers(); }, 10000);

    // ── STARTUP RESTORE ───────────────────────────────
    loadTimers();
    ensureRAF();

    // ── KEYBOARD ──────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('addForm').classList.contains('open') && document.activeElement.id === 'swName') createStopwatch();
    });
  </script>
</body>
